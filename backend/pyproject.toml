[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N"]
ignore = [
    "B008",  # FastAPI intentionally uses Depends/Header/Query calls in defaults.
    "E501",  # Black is the source of truth for wrapping; long strings may remain.
    "UP042", # Keep str + Enum compatibility with SQLAlchemy enum mappings for now.
    "UP046", # PEP 695 generic syntax is not required for this codebase baseline.
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"
addopts = "-q -ra"
