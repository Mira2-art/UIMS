<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#fdba57",
                        "tertiary-fixed-dim": "#a1cdde",
                        "on-secondary-container": "#724a00",
                        "inverse-primary": "#94cfe3",
                        "primary-fixed": "#b2ebff",
                        "outline-variant": "#bfc8cb",
                        "primary-fixed-dim": "#94cfe3",
                        "on-primary-fixed-variant": "#004e5e",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#eefaff",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#291800",
                        "inverse-surface": "#303030",
                        "surface-tint": "#266677",
                        "surface-container-low": "#f6f3f2",
                        "on-background": "#1b1c1c",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#dcd9d9",
                        "primary": "#206172",
                        "surface": "#fcf9f8",
                        "tertiary-fixed": "#bceafa",
                        "tertiary": "#335f6d",
                        "secondary": "#825500",
                        "secondary-container": "#fdba57",
                        "on-tertiary-fixed-variant": "#1e4c5a",
                        "on-primary-fixed": "#001f27",
                        "tertiary-container": "#4c7887",
                        "on-error-container": "#93000a",
                        "on-surface": "#1b1c1c",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e4e2e1",
                        "surface-bright": "#fcf9f8",
                        "inverse-on-surface": "#f3f0ef",
                        "surface-variant": "#e4e2e1",
                        "surface-container-high": "#eae7e7",
                        "primary-container": "#3d7a8c",
                        "surface-container": "#f0eded",
                        "secondary-fixed": "#ffddb3",
                        "outline": "#70787c",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#40484b",
                        "on-secondary-fixed-variant": "#633f00",
                        "on-primary-container": "#effaff",
                        "on-tertiary-fixed": "#001f27",
                        "background": "#fcf9f8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "padding-screen": "16px",
                        "stack-md": "16px",
                        "stack-lg": "24px",
                        "gutter": "12px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "body-lg": ["Geist"],
                        "body-sm": ["Geist"],
                        "caption": ["Geist"],
                        "h2": ["Geist"],
                        "overline": ["Geist"],
                        "display": ["Geist"],
                        "h3": ["Geist"],
                        "h1": ["Geist"]
                    },
                    "fontSize": {
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "500"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "caption": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.3px", "fontWeight": "700"}],
                        "overline": ["11px", {"lineHeight": "16px", "letterSpacing": "0.8px", "fontWeight": "700"}],
                        "display": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.5px", "fontWeight": "800"}],
                        "h3": ["17px", {"lineHeight": "24px", "letterSpacing": "-0.2px", "fontWeight": "600"}],
                        "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.4px", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-scale:active {
            transform: scale(0.98);
        }
        body {
            font-family: 'Geist', sans-serif;
            background-color: #FAFAFA;
        }
        .tonal-layer {
            background-color: #FFFFFF;
            border: 1px solid #EBEBEB;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-start overflow-x-hidden">
<!-- Top Navigation Suppression (Linear/Transactional) -->
<!-- As per "Shell Visibility & Relevance" rule, TopAppBar and BottomNavBar are hidden for Login -->
<!-- Main Content Canvas -->
<main class="w-full max-w-[390px] px-padding-screen pt-12 pb-8 flex flex-col flex-grow items-center">
<!-- Header: Brand Mark -->
<header class="flex flex-col items-center mb-stack-lg animate-in fade-in slide-in-from-top-4 duration-700">
<div class="w-16 h-16 flex items-center justify-center bg-primary rounded-xl mb-base text-on-primary">
<span class="material-symbols-outlined text-[32px]" data-icon="school">school</span>
</div>
<h1 class="font-display text-display text-primary tracking-tight">Trustech</h1>
</header>
<!-- Messaging -->
<div class="w-full text-center mb-stack-lg">
<h2 class="font-h1 text-h1 text-on-surface mb-2">Sign In</h2>
<p class="font-body-lg text-on-surface-variant">Welcome back to your academic portal.</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-stack-md" id="loginForm">
<!-- Email Input -->
<div class="space-y-base">
<label class="font-caption text-caption text-on-surface-variant ml-1" for="email">Email address</label>
<div class="relative group">
<input class="w-full h-[52px] px-4 rounded-lg bg-white border border-[#EBEBEB] focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-lg text-on-surface" id="email" placeholder="student@trustech.edu" required="" type="email"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[20px]" data-icon="alternate_email">alternate_email</span>
</div>
</div>
<!-- Password Input -->
<div class="space-y-base">
<div class="flex justify-between items-end px-1">
<label class="font-caption text-caption text-on-surface-variant" for="password">Password</label>
<a class="font-caption text-caption text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative group">
<input class="w-full h-[52px] px-4 rounded-lg bg-white border border-[#EBEBEB] focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-lg text-on-surface" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" id="togglePassword" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- CTA Primary Button -->
<button class="w-full h-[52px] bg-primary text-on-primary rounded-lg font-h2 text-h2 flex items-center justify-center active-scale transition-transform mt-stack-lg shadow-sm" type="submit">
                Sign in
            </button>
</form>
<!-- Social / Divider -->
<div class="w-full flex items-center gap-base my-stack-lg">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="font-overline text-overline text-on-surface-variant uppercase">or connect with</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<!-- Social Login: Edu-Connect -->
<button class="w-full h-[52px] border border-primary text-primary rounded-lg font-h3 text-h3 flex items-center justify-center gap-stack-sm active-scale transition-transform bg-white">
<span class="material-symbols-outlined" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
            Edu-Connect
        </button>
<!-- Footer / Registry Link -->
<footer class="mt-auto pt-stack-lg text-center">
<p class="font-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Contact Registry</a>
</p>
</footer>
<!-- Bottom Ambient Decorative Element -->
<div class="fixed -bottom-16 -left-16 w-48 h-48 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed top-1/2 -right-8 w-32 h-32 bg-secondary-container/10 rounded-full blur-2xl pointer-events-none"></div>
</main>
<script>
        // Micro-interactions for form feedback
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>`;
            
            // Artificial delay to simulate processing
            setTimeout(() => {
                btn.innerHTML = originalContent;
                // Transition logic would go here
            }, 2000);
        });

        // Password visibility toggle
        const toggleBtn = document.getElementById('togglePassword');
        const passInput = document.getElementById('password');
        toggleBtn.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            toggleBtn.querySelector('span').textContent = isPass ? 'visibility_off' : 'visibility';
        });

        // Input focus styling enhancement
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined')?.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined')?.classList.remove('text-primary');
            });
        });
    </script>
</body></html>
