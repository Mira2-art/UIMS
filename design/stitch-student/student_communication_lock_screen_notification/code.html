<style>

<!-- Subtle Amber Glow Interaction Script -->
<script>
        document.addEventListener('touchstart', (e) => {
            const glow = document.createElement('div');
            glow.className = 'absolute rounded-full pointer-events-none z-50 transition-opacity duration-700';
            glow.style.width = '100px';
            glow.style.height = '100px';
            glow.style.background = 'radial-gradient(circle, rgba(253, 186, 87, 0.15) 0%, rgba(253, 186, 87, 0) 70%)';
            glow.style.left = `${e.touches[0].clientX - 50}px`;
            glow.style.top = `${e.touches[0].clientY - 50}px`;
            document.body.appendChild(glow);
            
            requestAnimationFrame(() => {
                glow.style.opacity = '1';
                setTimeout(() => {
                    glow.style.opacity = '0';
                    setTimeout(() => glow.remove(), 700);
                }, 50);
            });
        });
    </script>
