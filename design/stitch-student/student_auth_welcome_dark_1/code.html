<!-- Interactive Layer: Floating Insight Particles -->
<div class="fixed inset-0 pointer-events-none z-0" id="particle-container"></div>
<script>
        // Simple micro-interaction for floating "insight" particles
        function createParticles() {
            const container = document.getElementById('particle-container');
            const count = 12;
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                const size = Math.random() * 4 + 2;
                particle.className = 'absolute bg-secondary-fixed-dim opacity-20 rounded-full';
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                
                const duration = Math.random() * 10 + 10;
                particle.animate([
                    { transform: 'translateY(0) scale(1)', opacity: 0.1 },
                    { transform: `translateY(-${Math.random() * 100 + 50}px) scale(1.5)`, opacity: 0.3 },
                    { transform: 'translateY(-200px) scale(0)', opacity: 0 }
                ], {
                    duration: duration * 1000,
                    iterations: Infinity,
                    delay: Math.random() * -20000
                });
                
                container.appendChild(particle);
            }
        }
        createParticles();

        // Button Click Interactions
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.classList.add('scale-[0.98]');
            });
            btn.addEventListener('touchend', function() {
                this.classList.remove('scale-[0.98]');
            });
        });
    </script>
