      animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

<body class="bg-surface overflow-hidden">
<!-- Lock Screen Background -->
<div class="fixed inset-0 z-0">

<div class="absolute inset-0 bg-black/10"></div>
</div>
<!-- Main Canvas -->
<main class="relative z-10 flex flex-col items-center min-h-screen px-screen-padding pt-24 pb-md">
<!-- Lock Screen Clock -->
<div class="text-center mb-xl">
<h1 class="font-display text-[80px] text-white leading-none tracking-tight drop-shadow-md">09:41</h1>
<p class="font-body-lg text-white/90 mt-2 font-medium tracking-wide">Tuesday, October 22</p>
</div>
<!-- Notification Container -->
<div class="w-full max-w-[400px] notification-slide-in">
<!-- Push Notification Card -->
<div class="blur-backdrop bg-white/85 border border-outline-variant/50 rounded-xl overflow-hidden shadow-2xl">
<!-- Header -->
<div class="flex items-center justify-between px-md py-sm border-b border-outline-variant/30">
<div class="flex items-center gap-xs">
<div class="w-6 h-6 bg-primary rounded flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-white" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<span class="font-overline text-on-surface-variant uppercase tracking-widest">Institutional Broadcast</span>
</div>
<span class="font-caption text-on-surface-variant/60">now</span>
</div>
<!-- Content -->
<div class="p-md">
<div class="flex flex-col gap-xs">
<h3 class="font-h3 text-on-surface">New Announcement</h3>
<p class="font-body-sm text-on-surface-variant leading-relaxed">
<span class="font-semibold text-primary">Dr. Rivers:</span> Fall 2024 Final Examination Schedule is now available. Review attached policies.
            </p>
</div>
<!-- Subtle Attachment Indicator -->
<div class="mt-md flex items-center gap-xs p-xs bg-surface-container-low border border-outline-variant/40 rounded-lg">
<span class="material-symbols-outlined text-primary text-[18px]">description</span>
<span class="font-caption text-primary font-medium">Exam_Policies_2024.pdf</span>
</div>
</div>
<!-- Action Buttons -->
<div class="flex border-t border-outline-variant/30">
<button class="flex-1 py-md border-r border-outline-variant/30 font-label text-primary hover:bg-white/50 active:bg-white/70 transition-colors">
            Read Full Post
          </button>
<button class="flex-1 py-md font-label text-on-surface-variant hover:bg-white/50 active:bg-white/70 transition-colors">
            Acknowledge
          </button>
</div>
</div>
<!-- Secondary Stacked Notifications (Visual Depth) -->
<div class="w-[94%] mx-auto h-2 bg-white/40 border border-outline-variant/30 blur-backdrop mt-[-4px] rounded-b-xl opacity-80"></div>
<div class="w-[88%] mx-auto h-2 bg-white/30 border border-outline-variant/30 blur-backdrop mt-[-4px] rounded-b-xl opacity-60"></div>
</div>
<!-- Bottom Indicator -->
<div class="mt-auto mb-gutter w-full flex flex-col items-center">
<div class="flex items-center gap-xl mb-xl">
<div class="w-12 h-12 rounded-full blur-backdrop bg-white/20 flex items-center justify-center border border-white/30">
<span class="material-symbols-outlined text-white">flashlight_on</span>
</div>
<div class="w-12 h-12 rounded-full blur-backdrop bg-white/20 flex items-center justify-center border border-white/30">
<span class="material-symbols-outlined text-white">photo_camera</span>
</div>
</div>
<!-- Swipe Bar -->
<div class="w-32 h-1.5 bg-white/80 rounded-full"></div>
<p class="font-caption text-white/70 mt-4 tracking-widest font-semibold">SWIPE UP TO OPEN</p>
</div>
</main>
<!-- Overlay Interaction Script -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
      // Subtle parallax effect on the background based on mouse or tilt
      const bg = document.querySelector('img[data-alt]');
      window.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 50;
        const y = (window.innerHeight / 2 - e.pageY) / 50;
        bg.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
      });

      // Simple click interactions for notification
      const buttons = document.querySelectorAll('button');
      buttons.forEach(btn => {
        btn.addEventListener('click', function() {
          const card = this.closest('.notification-slide-in');
          card.style.transition = 'all 0.4s ease';
          card.style.transform = 'scale(0.95)';
          card.style.opacity = '0';
          setTimeout(() => {
            card.remove();
          }, 400);
        });
      });
    });
  </script>
</body></html>
