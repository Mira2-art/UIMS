</div>
<!-- Empty State Text -->
<h2 class="text-h1 font-h1 text-on-surface mb-sm">No Courses Assigned</h2>
<p class="text-body-lg font-body-lg text-on-surface-variant mb-xl leading-relaxed">
                You haven't been assigned to any courses for the current semester. Please contact the Registrar's Office if this is an error.
            </p>

<span class="material-symbols-outlined transition-transform duration-500" id="refresh-icon">refresh</span>

</button>

<span class="text-label font-label">Profile</span>
</a>

<script>
        function handleRefresh(btn) {
            const icon = btn.querySelector('#refresh-icon');
            icon.classList.add('rotate-180');
            
            // Artificial delay to simulate network call
            btn.classList.add('opacity-70', 'pointer-events-none');
            
            setTimeout(() => {
                icon.classList.remove('rotate-180');
                btn.classList.remove('opacity-70', 'pointer-events-none');
                
                // Trigger a small toast effect (optional UI feedback)
                const toast = document.createElement('div');
                toast.className = 'fixed bottom-20 left-1/2 -translate-x-1/2 bg-inverse-surface text-inverse-on-surface px-md py-sm rounded-lg text-body-sm shadow-lg animate-bounce';
                toast.textContent = 'Checking for updates...';
                document.body.appendChild(toast);
                
                setTimeout(() => toast.remove(), 2000);
            }, 600);
        }
    </script>
