<img class="w-full h-full object-cover mix-blend-overlay" data-alt="A wide-angle, cinematic photograph of a modern university library at dusk, featuring rows of organized bookshelves and glowing ambient lighting. The atmosphere is quiet, academic, and professional, with a deep blue and teal color palette reflecting a high-end educational environment. Soft light spills from minimalist reading lamps, creating a sense of focused intelligence and institutional trust." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBJrneHB-G7UlGwP3eC1J3efoXhW-Ou90dkxVQkihJ8eeK6tF8HmDYoYcSyC4XYyWATEJtcDj05MPjGqi3icjAAkn1pDxTPoBeMB0MAzG_AsGJKSp8Ha9PW6ii9bNnF0hdoxER-b91t_XJ_VxjMqdjZXGXBSXKECWxbTqJ8QTdlRwKbxjYvrHi0EZtgJzCOTwQTIDBRwrklgnI0UQ2D5ySBeCcsF1n0ZRjnCYTdsyYIEe-KI_HzR9uS4Pr4sgftrqtsYRvE-buzkMCJ"/>

<div class="mb-lg float-animation">
<div class="w-20 h-20 rounded-xl bg-primary-fixed-dim/20 backdrop-blur-md border border-primary-fixed-dim/30 flex items-center justify-center">
<span class="material-symbols-outlined text-[48px] text-primary-fixed-dim" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>

            </p>

<!-- Get Started Button (Amber) -->

</button>

</div>

<span class="material-symbols-outlined text-xl" data-icon="shield">shield</span>
<span class="material-symbols-outlined text-xl" data-icon="public">public</span>
</div>

<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', function(e) {
                let x = e.clientX - e.target.offsetLeft;
                let y = e.clientY - e.target.offsetTop;
                let ripples = document.createElement('span');
                ripples.style.left = x + 'px';
                ripples.style.top = y + 'px';
                this.appendChild(ripples);
                setTimeout(() => { ripples.remove() }, 1000);
            });
        });
        
        // Background subtle movement
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelector('.bg-teal-gradient').style.backgroundPosition = `${50 + moveX}% ${50 + moveY}%`;
        });
    </script>
