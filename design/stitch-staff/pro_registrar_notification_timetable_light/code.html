<body class="bg-surface text-on-surface font-body-lg overflow-hidden">
<!-- Lock Screen Background Wrapper -->
<div class="fixed inset-0 lockscreen-bg" data-alt="A serene and professional university campus at golden hour, featuring minimalist architectural lines and soft sunlight filtering through trees. The background is intentionally blurred to create a high-fidelity mobile lock screen atmosphere. The aesthetic is clean and modern, using a palette of soft teals and warm light-mode tones to maintain corporate elegance and calmness.">
<!-- Dark Overlay for Contrast -->
<div class="absolute inset-0 bg-black/30 backdrop-blur-sm"></div>
<!-- Mobile Layout Canvas -->
<div class="relative h-screen flex flex-col items-center justify-start pt-xl">
<!-- Lock Screen Clock -->
<div class="text-center text-white mb-xl mt-12">
<p class="font-display text-display tracking-tight">09:41</p>
<p class="font-label text-label opacity-90">Friday, October 24</p>
</div>
<!-- Notification Container (The Focused Task) -->
<div class="w-full px-screen-padding max-w-md animate-in fade-in slide-in-from-bottom-8 duration-500">
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden shadow-sm">
<!-- Notification Header -->
<div class="px-md py-sm flex items-center justify-between border-b border-outline-variant bg-surface-container-low">
<div class="flex items-center gap-xs">
<div class="bg-primary-container p-1 rounded-md flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[16px]">school</span>
</div>
<span class="font-overline text-overline text-on-surface-variant">TRUSTECH STAFF PRO</span>
</div>
<span class="font-caption text-caption text-on-surface-variant">now</span>
</div>
<!-- Notification Content -->
<div class="p-md">
<h3 class="font-h3 text-h3 text-primary mb-xs">Timetable Modified</h3>
<p class="font-body-sm text-on-surface-variant leading-relaxed">
                            CS-401 (AI) Friday session moved to CS Lab 02. Tap to view updated schedule.
                        </p>
</div>
<!-- Action Buttons -->
<div class="flex border-t border-outline-variant">
<button class="flex-1 py-md font-label text-label text-primary border-r border-outline-variant hover:bg-surface-container-high transition-colors active:scale-[0.98]">
                            View Timetable
                        </button>
<button class="flex-1 py-md font-label text-label text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-[0.98]">
                            Dismiss
                        </button>
</div>
</div>
</div>
<!-- Secondary Contextual Info (Bottom of Lock Screen) -->
<div class="mt-auto mb-12 flex flex-col items-center gap-md">
<div class="flex gap-lg">
<div class="w-12 h-12 rounded-full bg-white/20 backdrop-blur-md border border-white/30 flex items-center justify-center text-white cursor-pointer hover:bg-white/30 transition-all">
<span class="material-symbols-outlined" data-weight="fill">flashlight_on</span>
</div>
<div class="w-12 h-12 rounded-full bg-white/20 backdrop-blur-md border border-white/30 flex items-center justify-center text-white cursor-pointer hover:bg-white/30 transition-all">
<span class="material-symbols-outlined" data-weight="fill">camera_alt</span>
</div>
</div>
<div class="h-1.5 w-32 bg-white/40 rounded-full mb-2"></div>
</div>
</div>
</div>
<!-- Hidden Simulation of Staff Portal Elements for context consistency -->
<!-- These are not rendered but demonstrate alignment with the provided JSON structures -->
<div class="hidden">
<!-- TopAppBar (Simulated Context) -->
<header class="w-full top-0 sticky border-b border-outline-variant flex items-center justify-between px-md h-[64px] bg-surface">
<span class="material-symbols-outlined text-primary">menu</span>

</header>

</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant font-medium">
<span class="material-symbols-outlined">task_alt</span>
<span class="font-label text-label">Tasks</span>
</div>
</nav>
</div>
<script>
        // Micro-interaction for the notification card
        const notification = document.querySelector('.animate-in');
        notification.addEventListener('touchstart', () => {
            notification.style.transform = 'scale(0.99)';
        });
        notification.addEventListener('touchend', () => {
            notification.style.transform = 'scale(1)';
        });

        // Simulating tap to view timetable
        const viewBtn = document.querySelector('button:first-of-type');
        viewBtn.addEventListener('click', () => {
            notification.classList.add('translate-y-[-10px]', 'opacity-0');
            notification.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            setTimeout(() => {
                alert('Navigating to Academic Timetable...');
            }, 300);
        });
    </script>
