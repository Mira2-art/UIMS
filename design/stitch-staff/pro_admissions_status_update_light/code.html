<!-- Micro-interactions Script -->
<script>
        function setStatus(status) {
            const buttons = document.querySelectorAll('.status-btn');
            buttons.forEach(btn => {
                btn.classList.remove('border-primary', 'bg-primary-container', 'text-on-primary-container', 'shadow-sm');
                btn.classList.add('bg-surface', 'text-on-surface-variant', 'border-transparent');
                
                // Set Material Symbol weight for inactive
                const icon = btn.querySelector('.material-symbols-outlined');
                icon.style.fontVariationSettings = "'FILL' 0, 'wght' 400";
            });

            const activeBtn = document.querySelector(`[data-status="${status}"]`);
            if (activeBtn) {
                activeBtn.classList.add('border-primary', 'bg-primary-container', 'text-on-primary-container', 'shadow-sm');
                activeBtn.classList.remove('bg-surface', 'text-on-surface-variant', 'border-transparent');
                
                // Set Material Symbol weight for active
                const icon = activeBtn.querySelector('.material-symbols-outlined');
                icon.style.fontVariationSettings = "'FILL' 1, 'wght' 600";
            }
        }

        // Initialize with default status
        window.onload = () => setStatus('Reviewing');
    </script>
