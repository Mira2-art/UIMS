  <text x="760" y="824" font-size="11.5" fill="#374151"><tspan font-family="monospace" font-weight="700">:id</tspan> = path parameter (courseId · chargeId · announcementId). Detail/secondary screens push full-screen (back arrow, no bottom bar).</text>

  <text x="760" y="842" font-size="11.5" fill="#374151">Theme &amp; Language are modal sheets (local state via providers) — not navigable routes. Initial location: <tspan font-family="monospace">/splash</tspan>.</text>
